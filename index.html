<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>

    <meta name="description" content="Free online QR code generator. Add a custom logo, set a label, and download your QR code instantly.">
    <meta name="robots" content="index, follow">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- QRCode.js -->
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --accent: #06b6d4;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        /* ── Navbar ── */
        .top-nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .top-nav .brand {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }
        .top-nav .brand:hover { color: var(--primary-dark); }

        /* ── Hero ── */
        .hero {
            text-align: center;
            padding: 2.5rem 1rem 1.5rem;
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.4rem;
        }
        .hero p { color: var(--muted); font-size: 0.95rem; }
        .typing-text { font-size: 1.1rem; font-weight: 600; color: var(--accent); }

        /* ── Card ── */
        .gen-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            max-width: 460px;
            margin: 0 auto;
            box-shadow: 0 4px 24px rgba(79,70,229,0.07);
        }

        .form-label {
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 0.35rem;
        }

        .form-control {
            border-radius: 10px;
            border: 1.5px solid var(--border);
            padding: 0.6rem 0.9rem;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
        }

        /* Logo upload area */
        .logo-upload-area {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .logo-upload-area:hover { border-color: var(--primary); background: #f5f3ff; }
        .logo-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .logo-upload-area .upload-icon { font-size: 1.4rem; color: var(--muted); }
        .logo-upload-area .upload-text { font-size: 0.82rem; color: var(--muted); margin-top: 0.25rem; }
        #logoPreview {
            width: 48px;
            height: 48px;
            object-fit: contain;
            display: none;
            border-radius: 8px;
            margin: 0 auto 0.25rem;
        }

        /* Color pickers */
        .color-row { display: flex; gap: 1rem; }
        .color-row .color-item { flex: 1; }
        input[type="color"] {
            width: 100%;
            height: 38px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            padding: 2px;
            cursor: pointer;
        }

        /* Size range */
        input[type="range"] { width: 100%; accent-color: var(--primary); }

        /* Generate button */
        .btn-generate {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.7rem 2rem;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-generate:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn-generate:active { transform: translateY(0); }

        .validation-msg { font-size: 0.87rem; }
        .validation-msg .alert { border-radius: 8px; padding: 0.5rem 0.9rem; }

        /* ── Modal ── */
        .modal-content { border-radius: 16px; border: none; overflow: hidden; }
        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            border: none;
            padding: 1rem 1.5rem;
        }
        .modal-header .modal-title { font-weight: 700; font-size: 1rem; color: #fff; }
        .modal-header .close { color: #fff; opacity: 0.8; }
        .modal-body { background: var(--bg); padding: 1.5rem; }
        #qrcode-modal {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #qrcode-modal canvas {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .modal-label {
            font-size: 0.8rem;
            color: var(--muted);
            text-align: center;
            margin-top: 0.5rem;
        }
        .modal-footer-bar {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 0.9rem 1.2rem;
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }
        .btn-download {
            background: #10b981;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-download:hover { background: #059669; }
        .btn-close-modal {
            background: var(--border);
            color: var(--text);
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
        }

        /* ── Footer ── */
        .bottom-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 0.55rem;
            font-size: 0.8rem;
            color: var(--muted);
        }
        .bottom-footer a { color: var(--primary); text-decoration: none; }
        .bottom-footer a:hover { text-decoration: underline; }

        /* hidden placeholder for raw QR */
        #qrcode { display: none; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="top-nav">
        <i class="fas fa-qrcode" style="font-size:1.4rem;color:var(--primary)"></i>
        <a class="brand" href="#">QR Code Generator</a>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1><i class="fas fa-qrcode mr-2"></i>QR Code Generator</h1>
        <p class="typing-text"></p>
        <p>Generate custom QR codes with your own logo &mdash; free &amp; instant.</p>
    </div>

    <!-- Main card -->
    <div class="container">
        <div class="gen-card">
            <div id="time" class="text-center mb-3" style="font-size:0.8rem;color:var(--muted)"></div>

            <form id="myForm" novalidate>

                <!-- URL -->
                <div class="form-group">
                    <label class="form-label" for="urlInput"><i class="fas fa-link mr-1"></i>URL / Text to encode</label>
                    <input type="text" class="form-control" id="urlInput" placeholder="https://example.com or any text" required>
                </div>

                <!-- Label -->
                <div class="form-group">
                    <label class="form-label" for="labelInput"><i class="fas fa-tag mr-1"></i>Label (used in filename)</label>
                    <input type="text" class="form-control" id="labelInput" placeholder="e.g. My Website, Company Name…" required>
                </div>

                <!-- Logo upload -->
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-image mr-1"></i>Logo (optional)</label>
                    <div class="logo-upload-area" id="logoUploadArea">
                        <input type="file" id="logoFile" accept="image/*">
                        <img id="logoPreview" src="" alt="logo preview">
                        <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                        <div class="upload-text" id="uploadText">Click or drag to upload a logo</div>
                    </div>
                    <button type="button" id="clearLogo" class="btn btn-sm btn-link text-danger p-0 mt-1" style="display:none;font-size:0.8rem">
                        <i class="fas fa-times mr-1"></i>Remove logo
                    </button>
                </div>

                <!-- Colors -->
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-palette mr-1"></i>Colors</label>
                    <div class="color-row">
                        <div class="color-item">
                            <div style="font-size:0.75rem;color:var(--muted);margin-bottom:4px">Foreground</div>
                            <input type="color" id="fgColor" value="#000000">
                        </div>
                        <div class="color-item">
                            <div style="font-size:0.75rem;color:var(--muted);margin-bottom:4px">Background</div>
                            <input type="color" id="bgColor" value="#ffffff">
                        </div>
                    </div>
                </div>

                <!-- Size -->
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-expand-alt mr-1"></i>Size: <span id="sizeValue">256</span>px</label>
                    <input type="range" id="qrSize" min="128" max="512" value="256" step="32">
                </div>

                <!-- Error correction -->
                <div class="form-group">
                    <label class="form-label" for="ecLevel"><i class="fas fa-shield-alt mr-1"></i>Error correction</label>
                    <select class="form-control" id="ecLevel">
                        <option value="L">L – Low (7%)</option>
                        <option value="M" selected>M – Medium (15%)</option>
                        <option value="Q">Q – Quartile (25%)</option>
                        <option value="H">H – High (30%)</option>
                    </select>
                </div>

                <div class="validation-msg" id="validationResult"></div>

                <button type="submit" class="btn-generate mt-2">
                    <i class="fas fa-magic mr-2"></i>Generate QR Code
                </button>
            </form>
        </div>
    </div>

    <!-- Hidden QR scratch area -->
    <div id="qrcode"></div>

    <!-- Modal -->
    <div class="modal fade" id="myModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-check-circle mr-2"></i>Your QR Code is ready!</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body text-center">
                    <div id="qrcode-modal"></div>
                    <div class="modal-label" id="modalLabel"></div>
                </div>
                <div class="modal-footer-bar">
                    <button id="downloadQr" class="btn-download">
                        <i class="fas fa-download mr-1"></i>Download PNG
                    </button>
                    <button class="btn-close-modal" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="bottom-footer">
        Free QR Code Generator &mdash; <a href="https://github.com/amadratitus/qrgen" target="_blank">Open Source on GitHub</a>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main-index.js"></script>
</body>
</html>
